<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iRealEstateMxPro — Iniciar Sesion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      background: #1a1a1a;
      border: 1px solid rgba(201,162,39,.15);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      width: 100%;
      max-width: 420px;
      padding: 48px 40px;
      text-align: center;
    }
    .login-logo {
      height: 60px;
      margin-bottom: 12px;
    }
    .login-title {
      font-size: 22px;
      font-weight: 700;
      color: #c9a227;
      margin-bottom: 4px;
    }
    .login-subtitle {
      font-size: 14px;
      color: rgba(255,255,255,.45);
      margin-bottom: 32px;
    }
    .form-group {
      text-align: left;
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,.5);
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(201,162,39,.2);
      border-radius: 10px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s;
      outline: none;
      background: #111;
      color: #e0e0e0;
    }
    .form-group input:focus {
      border-color: #c9a227;
    }
    .error-msg {
      background: rgba(192,57,43,.15);
      border: 1px solid rgba(192,57,43,.3);
      color: #e74c3c;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #c9a227, #d4af37);
      color: #0a0a0a;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      font-family: 'Inter', sans-serif;
    }
    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(201, 162, 39, 0.4);
    }
    .login-footer {
      margin-top: 24px;
      font-size: 12px;
      color: rgba(255,255,255,.25);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <img src="/static/img/logo-full.png" alt="iRealEstateMx" class="login-logo" />
    <h1 class="login-title">Bienvenido</h1>
    <p class="login-subtitle">Inicia sesion para continuar</p>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="tu@email.com" required />
      </div>
      <div class="form-group">
        <label for="password">Contrasena</label>
        <input type="password" id="password" name="password" placeholder="Tu contrasena" required />
      </div>
      <button type="submit" class="btn-login">Iniciar Sesion</button>
    </form>

    <a href="/forgot-password" style="display:inline-block;margin-top:16px;font-size:13px;color:#c9a227;text-decoration:none;font-weight:500;">¿Olvidaste tu contraseña?</a>

    <p class="login-footer">iRealEstateMxPro &copy; 2026</p>
  </div>
</body>
</html>
