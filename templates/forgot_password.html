<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iRealEstateMxPro — Recuperar Contraseña</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: #1a1a1a;
      border: 1px solid rgba(201,162,39,.15);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      width: 100%;
      max-width: 420px;
      padding: 48px 40px;
      text-align: center;
    }
    .logo { height: 60px; margin-bottom: 12px; }
    .title { font-size: 22px; font-weight: 700; color: #c9a227; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: rgba(255,255,255,.45); margin-bottom: 32px; line-height: 1.5; }
    .form-group { text-align: left; margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: rgba(255,255,255,.5); margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 12px 16px; border: 1px solid rgba(201,162,39,.2);
      border-radius: 10px; font-size: 15px; font-family: 'Inter', sans-serif;
      transition: border-color 0.2s; outline: none; background: #111; color: #e0e0e0;
    }
    .form-group input:focus { border-color: #c9a227; }
    .error-msg {
      background: rgba(192,57,43,.15); border: 1px solid rgba(192,57,43,.3);
      color: #e74c3c; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 20px;
    }
    .success-msg {
      background: rgba(39,174,96,.15); border: 1px solid rgba(39,174,96,.3);
      color: #2ecc71; padding: 14px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; line-height: 1.5;
    }
    .btn-primary {
      width: 100%; padding: 14px; background: linear-gradient(135deg, #c9a227, #d4af37);
      color: #0a0a0a; border: none; border-radius: 10px; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; font-family: 'Inter', sans-serif;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(201, 162, 39, 0.4); }
    .back-link { display: inline-block; margin-top: 20px; font-size: 13px; color: #c9a227; text-decoration: none; font-weight: 500; }
    .back-link:hover { color: #d4af37; }
    .footer { margin-top: 24px; font-size: 12px; color: rgba(255,255,255,.25); }
  </style>
</head>
<body>
  <div class="container">
    <img src="/static/img/logo-header.png" alt="iRealEstateMx" class="logo" />
    <h1 class="title">Recuperar contraseña</h1>
    <p class="subtitle">Ingresa tu email y te enviaremos un enlace para restablecer tu contraseña</p>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    {% if message %}
    <div class="success-msg">{{ message }}</div>
    {% else %}
    <form method="post" action="/forgot-password">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="tu@email.com" required />
      </div>
      <button type="submit" class="btn-primary">Enviar enlace de recuperacion</button>
    </form>
    {% endif %}

    <a href="/login" class="back-link">Volver a iniciar sesion</a>
    <p class="footer">iRealEstateMxPro 2026</p>
  </div>
</body>
</html>
