version: "3.8"

services:
  irealestate:
    build: .
    container_name: irealestate
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - uploads_data:/app/static/uploads
    expose:
      - "8000"
    labels:
      - "traefik.enable=true"
      # ─── Router principal: dominio público ───
      - "traefik.http.routers.fastapi.rule=Host(`irealestatemx.com`) || Host(`www.irealestatemx.com`) || Host(`api.irealestatemx.cloud`)"
      - "traefik.http.routers.fastapi.entrypoints=websecure"
      - "traefik.http.routers.fastapi.tls.certresolver=mytlschallenge"
      - "traefik.http.services.fastapi.loadbalancer.server.port=8000"
      # ─── Redirect www → sin www ───
      - "traefik.http.middlewares.www-redirect.redirectregex.regex=^https://www\\.irealestatemx\\.com/(.*)"
      - "traefik.http.middlewares.www-redirect.redirectregex.replacement=https://irealestatemx.com/$${1}"
      - "traefik.http.middlewares.www-redirect.redirectregex.permanent=true"
      - "traefik.http.routers.fastapi.middlewares=www-redirect"
    depends_on:
      - postgres
    networks:
      - n8n_default

  postgres:
    image: postgres:16-alpine
    container_name: irealestate_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-irealestate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-irealestate_secret_2024}
      POSTGRES_DB: ${POSTGRES_DB:-irealestate}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - n8n_default

  waha:
    image: devlikeapro/waha:latest
    container_name: waha
    restart: unless-stopped
    environment:
      - WHATSAPP_DEFAULT_ENGINE=NOWEB
      - WHATSAPP_API_KEY=${WAHA_API_KEY:-your_secret_api_key}
      - WAHA_DASHBOARD_ENABLED=true
      - WAHA_DASHBOARD_USERNAME=${WAHA_DASHBOARD_USER:-admin}
      - WAHA_DASHBOARD_PASSWORD=${WAHA_DASHBOARD_PASS:-admin}
      - WHATSAPP_RESTART_ALL_SESSIONS=True
      - WAHA_LOG_LEVEL=info
    volumes:
      - waha_data:/app/.sessions
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.waha.rule=Host(`wa.irealestatemx.cloud`)"
      - "traefik.http.routers.waha.entrypoints=websecure"
      - "traefik.http.routers.waha.tls.certresolver=mytlschallenge"
      - "traefik.http.services.waha.loadbalancer.server.port=3000"
    networks:
      - n8n_default

volumes:
  uploads_data:
  pgdata:
  waha_data:

networks:
  n8n_default:
    external: true
